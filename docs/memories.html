<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Memories — MY·CONF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="back">← Back</a>
    <span class="title">🧠 LIVE MEMORIES</span>
    <span class="live">Auto-updated on every push</span>
  </header>
  <main id="memories" class="memories">
    <div class="loader">Loading memories.md…</div>
  </main>
  <footer><a href="index.html">← Back to landing</a></footer>
  <script>
    // Fetch the auto-generated memories.md, render as styled cards
    fetch('memories.md')
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(md => {
        const main = document.getElementById('memories');
        const lines = md.split('\n');
        let html = '';
        let currentSection = null;
        for (const line of lines) {
          if (line.startsWith('# 🧠')) {
            html += `<h1 class="page-h1">${escape(line.slice(2))}</h1>`;
          } else if (line.startsWith('## ')) {
            if (currentSection) html += '</section>';
            currentSection = line.slice(3).trim();
            html += `<section class="mem-section"><h2>${escape(currentSection)}</h2>`;
          } else if (line.startsWith('### ')) {
            html += `<article class="mem-card"><h3>${escape(line.slice(4))}</h3>`;
          } else if (line.trim() === '---') {
            html += '</article>';
          } else if (line.trim().startsWith('_source:')) {
            html += `<p class="mem-meta">${escape(line.trim().slice(1, -1))}</p>`;
          } else if (line.trim()) {
            html += `<p>${escape(line)}</p>`;
          }
        }
        if (currentSection) html += '</section>';
        main.innerHTML = html;
      })
      .catch(err => {
        document.getElementById('memories').innerHTML = `
          <div class="empty">
            <h2>No memories exported yet</h2>
            <p>This page populates automatically after the first commit triggers the <code>export-engram.yml</code> workflow.</p>
            <p>Status: ${err}</p>
          </div>`;
      });
    function escape(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
