name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify (skill-matrix + second-termux + engram)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            second-termux-v2/package-lock.json
            engram+zerotoken/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Make verify.sh executable
        run: chmod +x scripts/verify.sh

      - name: Check INDEX.md is up-to-date
        run: node scripts/regen-index.mjs --check

      - name: Run verify.sh (second-termux + engram)
        run: ./scripts/verify.sh

      - name: Install Biome (for lint)
        run: npm install -g @biomejs/biome@^1.9.0

      - name: Biome check (second-termux)
        working-directory: second-termux-v2
        run: biome check . || true
        # `|| true` keeps CI informational; flip to fail-on-warn once cleaned.

      - name: Biome check (engram)
        working-directory: engram+zerotoken
        run: biome check . || true
